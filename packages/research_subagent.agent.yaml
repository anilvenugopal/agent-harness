# research_subagent — an AGENT package that underwriting_agent delegates to.
#
# Demonstrates the delegated-run boundary: it writes its OWN decision record
# (depth=1, parent_decision_id set), has its own tools, and returns a
# structured result to the parent. HITL gates are NOT permitted here (a
# synchronous delegation would block the parent worker — out of scope by
# design); the engine denies any gate fired at depth > 0.

name: research_subagent
kind: agent
version: v1
description: Gather supporting research for an underwriting decision.

system_prompt: |
  You are a research assistant. Use the search tool to gather facts relevant to
  the requested topic, then call submit_output with a concise findings summary.

prompt_template: |
  Research topic: {{input.topic}}
  Gather the most relevant facts and summarise.

inference:
  chain:
    - provider: anthropic
      model: claude-haiku-4-5
      priority: 0
      max_tokens: 1024
    - provider: gemini
      model: gemini-2.5-flash
      priority: 1
  max_turns: 5
  max_usd: 0.50

tools:
  - name: search
    description: Search an internal knowledge base.
    transport: mcp_http
    mcp_server: policy_service
    mcp_tool_name: search
    input_schema:
      type: object
      properties:
        query: {type: string}
      required: [query]

output_schema:
  findings:
    type: string
  sources_count:
    type: integer
