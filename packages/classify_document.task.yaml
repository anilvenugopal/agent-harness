# classify_document — a TASK package (unsigned YAML analog of a .vtx artifact).
#
# Single-turn structured transform: fetch a document from the store as a raw
# binary block, send it to the model natively (PDF → Anthropic document block;
# plain text → Anthropic text source), and emit a structured classification.
#
# Demonstrates: as_block source binding, ImageBlock/DocumentBlock in the IR,
# forced structured output (output_schema), and an S3 target write.
#
# Prerequisites:
#   docker compose up -d   (starts MinIO)
#   python scripts/seed_demo.py   (uploads samples/complaint.txt)

name: classify_document
kind: task
version: v1
description: Classify an incoming document from the document store.

system_prompt: |
  You are a document triage classifier for an insurance governance platform.
  Read the attached document and return a single best category with a confidence
  score and a one-sentence rationale.

  Categories:
    complaint  — customer expresses dissatisfaction or demands action
    claim      — formal insurance claim submission
    inquiry    — question about policy, coverage, or account
    payment    — billing issue or payment notification
    other      — does not fit the above

prompt_template: |
  Classify the attached document.
  document_key: {{input.document_key}}

inference:
  fallback_enabled: true
  chain:
    - provider: anthropic
      model: claude-opus-4-8
      priority: 0
      max_tokens: 1024
    - provider: gemini
      model: gemini-2.5-flash
      priority: 1
  max_turns: 1
  max_usd: 0.50

sources:
  - connector: s3_main
    method: get_bytes
    ref: "{{input.document_key}}"
    bind_to: document
    as_block: document
    required: true

output_schema:
  category:
    type: string
    enum: [complaint, claim, inquiry, payment, other]
  confidence:
    type: number
  rationale:
    type: string

targets:
  - connector: s3_main
    method: put_object
    from_path: "$"
    container: "classifications/{{run_id}}.json"
    required: false
